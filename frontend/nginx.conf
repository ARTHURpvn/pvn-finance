# nginx do container: serve o SPA e faz proxy do /api para a API.
# Fica atrás do nginx do host (que faz TLS na 80/443).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # API: /api/* → api:8000 (a barra final no proxy_pass remove o prefixo /api).
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: rotas do React Router caem no index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache dos assets com hash no nome (imutáveis)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
