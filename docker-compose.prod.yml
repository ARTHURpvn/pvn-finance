# Stack de produção. O nginx do HOST (na 80/443, com TLS) faz proxy para o
# serviço `web`, que é publicado só no loopback (127.0.0.1). A API e o banco
# ficam na rede interna do compose.
# Suba com: ./deploy.sh  (ou: docker compose -f docker-compose.prod.yml up -d --build)

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-consolida}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-consolida}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-consolida}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    restart: unless-stopped
    env_file: .env
    environment:
      # DATABASE_URL derivada dos POSTGRES_* — sempre em sincronia com a senha.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-consolida}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-consolida}
      APP_ENV: production
      TRUST_FORWARDED_FOR: "true"  # atrás do nginx: enxerga o IP real do cliente
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "uv run --no-dev alembic upgrade head &&
             uv run --no-dev uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build: ./api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-consolida}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-consolida}
      APP_ENV: production
    depends_on:
      db:
        condition: service_healthy
    command: ["uv", "run", "--no-dev", "python", "-m", "app.worker"]

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - api
    # Publicado só no loopback — o nginx do host faz o proxy + TLS.
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:80"

volumes:
  pgdata:
